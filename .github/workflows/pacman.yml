name: Generate Pac-Man
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ishaansingh-ai
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=#00ff00,#00cc00,#009900,#006600,#003300&pacman=true
            dist/pacman-dark.svg?color_snake=yellow&color_dots=#00ff41,#00cc33,#009926,#006619,#00330d&pacman=true&color_empty=#0d1117
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
